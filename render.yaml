services:
  # Backend Web Service
  - type: web
    name: osakamarket-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: osakamarket-db
          property: connectionString

  # Frontend Static Site
  - type: web
    name: osakamarket-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://osakamarket-backend.onrender.com

databases:
  - name: osakamarket-db
    databaseName: osakamarket
    plan: free
